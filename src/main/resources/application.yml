spring:
  datasource:
    url: jdbc:h2:mem:javerscleanup;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    de.tsboj.javerscleanup: DEBUG
    org.javers: WARN
